# ===========================================================
# Job-Hunter Pro — Phase 2 Config (PATCH 11 IMPROVEMENTS)
# ===========================================================

mode: "full_auto"

platforms:
  linkedin:
    enabled: true
    max_apply_per_run: 50
    scroll_count: 15
    search:
      # PATCH 11: De-duplicated, prioritized queries
      queries:
        - "IT Infrastructure Specialist"
        - "Senior System Administrator"
        - "Linux System Administrator"
        - "Cloud Infrastructure Engineer"
        - "Hybrid Cloud Engineer"
        - "Azure Cloud Engineer"
        - "Azure DevOps Engineer"
        - "Cloud Platform Engineer"
        - "Site Reliability Engineer"
        - "Platform Engineer"
      # location: "singapore"
      location: "European Union"
      remote: false
      hybrid: false
      date_posted: "past_week"
      experience_levels:
        - "Mid-Senior level"
        - "Associate"
      job_type: "Full-time"
      easy_apply_only: true
  indeed:
    enabled: true   # PATCH 22: keep off until credentials + first manual login/captcha verification
    max_apply_per_run: 10
    scroll_count: 8
    query_limit_per_run: 5
    discovery_max_per_session: 20
    region: "auto"      # auto-detect subdomain from search.location, e.g. Singapore -> sg.indeed.com
    title_gate:
      enabled: true
      positive_hints:
        - "cloud"
        - "devops"
        - "platform"
        - "site reliability"
        - "sre"
        - "infrastructure"
        - "linux"
        - "linux engineer"
        - "system administrator"
        - "systems engineer"
        - "azure"
        - "aws"
        - "kubernetes"
        - "architect"
      negative_hints:
        - "data entry"
        - "administrative"
        - "admin coordinator"
        - "bank admin"
        - "executive assistant"
        - "assistant"
        - "coordinator"
        - "secretary"
        - "receptionist"
        - "desktop support"
        - "helpdesk"
        - "mac support"
        - "customer service"
        - "hr support"
        - "scanning"
    search:
      queries:
        - "Cloud Infrastructure Engineer"
        - "Azure Cloud Engineer"
        - "Azure Engineer"
        - "Cloud Platform Engineer"
        - "Site Reliability Engineer"
        - "Platform Engineer"
      location: "singapore"
      remote: true
      hybrid: true
      date_posted: "past_week"
      experience_levels:
        - "Mid level"
        - "Senior level"
      job_type: "Full-time"
      easy_apply_only: true

  glassdoor:
    enabled: true
    max_apply_per_run: 5
    scroll_count: 8
    query_limit_per_run: 5
    discovery_max_per_session: 20
    security_wait_timeout: 300
    region: "auto"
    login_method: "auto"   # rekomendasi: pakai session/profile dulu, fallback ke email bila perlu
    search:
      queries:
        - "Cloud Infrastructure Engineer"
        - "Azure Cloud Engineer"
        - "Azure Engineer"
        - "Cloud Platform Engineer"
        - "Site Reliability Engineer"
      location: "Singapore"
      remote: true
      hybrid: true
      date_posted: "past_week"
      experience_levels:
        - "Mid level"
        - "Senior level"
      job_type: "Full-time"
      easy_apply_only: true

filters:
  location_guard:
    enabled: true
    # Global guard for all platforms. Prevents stale/expanded results outside the search market.
    # With location="Philadelphia", accepted examples:
    # - Philadelphia
    # - Greater Philadelphia
    # - Remote in United States
    # Rejected examples:
    # - Jakarta
    # - Indonesia
    # - Remote in Indonesia
    allow_remote: true
    allow_generic_remote: false
    remote_allowed_markets:
      - "United States"
      - "USA"
      - "US"
    allowed_keywords: []
    blocked_keywords: []

  # PATCH 11: Expanded title keywords — catches more relevant jobs
  title_keywords_include:
    - "engineer"
    - "sysadmin"
    - "cloud"
    - "infrastructure"
    - "sre"
    - "architect"
    - "administrator"
    - "specialist"
    - "platform"
    - "system"
    - "azure"
    - "aws"
    - "hybrid"
    - "linux"
    - "operations"
    - "vmware"
    - "kubernetes"
    - "container"
    - "ops"
    - "reliability"
    - "site"
    - "automation"
    # Common adjective markers
    - "senior"
    - "principal"
    - "lead engineer"   # specific (not "lead" alone which is generic)
    - "staff"
    - "iac"
  title_keywords_exclude:
    - "intern"
    - "internship"
    - "sales"
    - "marketing"
    - "manager of people"
    - "head of"
    - "director"
    - "vp "
    - "vice president"
    - "chief"
    - "junior"
    - "trainee"
    - "apprentice"
    - "founder"
    - "co-founder"
    # Excluded specializations (not your fit)
    - "data scientist"
    - "ml engineer"
    - "machine learning"
    - "frontend"
    - "react developer"
    - "mobile developer"
    - "ios developer"
    - "android developer"
  description_keywords_exclude:
    - "us citizen only"
    - "us citizen required"
    - "security clearance required"
    - "active clearance required"
    - "must be local to"
    - "no remote applicants"
  company_blacklist:
    - "Acme Corp"
  min_salary: 0
  skip_already_applied: true

