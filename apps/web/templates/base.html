<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Job-Hunter Pro{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#f6f8fa; }
    .badge-applied { background:#198754; }
    .badge-skipped { background:#6c757d; }
    .badge-failed  { background:#dc3545; }
    .badge-needs_answers { background:#fd7e14; }
    .badge-external { background:#0dcaf0; color:#000; }
    pre.log { background:#0d1117; color:#c9d1d9; padding:10px; border-radius:6px;
              max-height:300px; overflow:auto; font-size:12px; }
    .state-pill {
      display:inline-block; padding:6px 14px; border-radius:999px; font-weight:600;
      color:white; font-size:13px;
    }
    .state-running { background:#198754; }
    .state-paused  { background:#fd7e14; }
    .state-stopped { background:#dc3545; }
    .state-idle    { background:#6c757d; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">🤖 Job-Hunter Pro <small class="text-muted">Phase 1</small></a>
    <div class="d-flex gap-3 align-items-center">
      <a class="nav-link text-white" href="/">Dashboard</a>
      <a class="nav-link text-white" href="/applications">Applications</a>
      <a class="nav-link text-white" href="/questions">Questions</a>
    </div>
  </div>
</nav>

<div class="container py-4">
  {% with msgs = get_flashed_messages() %}
    {% for m in msgs %}
      <div class="alert alert-info alert-dismissible fade show" role="alert">
        {{ m }}
        <button class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
