# ===========================================================
# Job-Hunter Pro — Phase 2 Config (with AI)
# ===========================================================

mode: "semi_auto"   # full_auto | semi_auto | safe_auto

platforms:
  linkedin:
    enabled: true
    max_apply_per_run: 15
    search:
      queries:
        - "Cloud Infrastructure Engineer"
        - "Azure Engineer"
        - "Azure DevOps Engineer"
        - "Site Reliability Engineer"
        - "DevOps Engineer"
        - "Cloud Engineer"
        - "Platform Engineer"
        - "Kubernetes Engineer"
      location: "European Union"
      remote: true
      hybrid: true
      date_posted: "past_week"
      experience_levels:
        - "Mid-Senior level"
        - "Associate"
      job_type: "Full-time"
      easy_apply_only: true

filters:
  title_keywords_include:
    - "engineer"
    - "devops"
    - "cloud"
    - "infrastructure"
    - "sre"
    - "architect"
    - "administrator"
    - "specialist"
    - "platform"
    - "system"
    - "azure"
    - "aws"
    - "kubernetes"
    - "linux"
    - "operations"
  title_keywords_exclude:
    - "intern"
    - "internship"
    - "sales"
    - "marketing"
    - "manager of people"
    - "head of"
    - "director"
    - "vp "
    - "vice president"
    - "chief"
    - "junior"
    - "trainee"
    - "apprentice"
  description_keywords_exclude:
    - "us citizen only"
    - "us citizen required"
    - "security clearance required"
    - "active clearance required"
  company_blacklist:
    - "Acme Corp"
  min_salary: 0
  skip_already_applied: true

personal:
  first_name: "Wahyu Budi"
  last_name: "Prastowo"
  email: "wahyubudiprastowo@gmail.com"
  phone_country_code: "Indonesia (+62)"
  phone: "8123456789"
  city: "Jakarta"
  country: "Indonesia"
  linkedin_url: "https://linkedin.com/in/your-profile"
  github_url: ""
  portfolio_url: ""
  years_experience: "8"
  current_company: "Digiserve"
  current_title: "IT Infrastructure Specialist"
  highest_education: "Bachelor's Degree"
  authorized_to_work: "Yes"
  require_sponsorship: "Yes"
  willing_to_relocate: "Yes"
