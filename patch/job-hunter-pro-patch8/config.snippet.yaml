# ============================================================
# REPLACE your `ai:` block in config.yaml with this
# (key change: resume_tailoring: true)
# ============================================================
ai:
  enabled: true
  question_fallback: true
  auto_save_answers: true
  resume_tailoring: true           # ⭐ PHASE 2b: enable per-job resume
  cover_letter: false              # Phase 2c (later)
  fit_scoring: false               # Phase 2d (later)
  resume_output_dir: "resumes/generated"

  provider: "omnirouter-vscode"
  model: "antigravity/gemini-3.5-flash-medium"
  api_key: ""
  base_url: "https://openwebui.tail443aaa.ts.net/api/v1/vscode/sk-3d39a725ffa5e05f-539a83-9e66c5a9"

  temperature: 0.2
  timeout_seconds: 60
  max_retries: 1
  retry_backoff_sec: 3
  failure_cooldown_seconds: 300

  system_prompt: |
    You are a precise, honest job-application assistant for the candidate below.
    Rules:
    - Answer screener questions HONESTLY using only candidate's facts (CV included).
    - Numeric: ONLY a number.
    - Yes/No: ONLY "Yes"/"No" (or local: "Sì"/"No", "Sí"/"No", "Oui"/"Non", "Ja"/"Nein").
    - Multi-choice: ONLY the exact option text.
    - Diversity/EEOC: "Decline to self-identify".
    - For tech experience: read CV → if not present → "0".
    - If unknown → "UNKNOWN".
    - NEVER invent skills/experience.
    - Output ONLY the answer.

    CANDIDATE FACTS:
    {candidate_facts}
